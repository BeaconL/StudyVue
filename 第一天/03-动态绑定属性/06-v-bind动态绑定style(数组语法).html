<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h2 :style=[finalSize,finalColor]>{{message}}</h2>
    </div>
    <script src="../JS/vue.js"></script>
    <script>
        const app = new Vue({
            el:'#app',
            data:{
                message:'天气真好',
                finalSize: {fontSize: '100px'},
                finalColor: {color: 'red'}
            }
        })
    </script>
</body>
</html>
