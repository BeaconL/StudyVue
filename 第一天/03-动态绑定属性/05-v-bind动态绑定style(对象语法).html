<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h2 :style="{fontSize: finalSize, backgroundColor: finalColor}">{{message}}</h2>
        <h2>{{fontSize}}</h2>
    </div>
    <script src="../JS/vue.js"></script>
    <script>
        const app = new Vue({
            el:'#app',
            data:{
                message:'天气真好',
                finalSize: '100px',
                finalColor: 'red',
                fontSize: '100px'
            }
        })
    </script>
</body>
</html>
