<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <h2>{{message}}</h2>
    <label for="a">
      <input type="checkbox" id="a" v-model="isFlag">是否同意协议
    </label>
    <button :disabled="!isFlag">提交</button>
    <br>
    <input type="checkbox" value="DOTA2" v-model="hobbies">DOTA2
    <input type="checkbox" value="魔兽世界" v-model="hobbies">魔兽世界
    <input type="checkbox" value="怪物猎人：世界" v-model="hobbies">怪物猎人：世界
    <input type="checkbox" value="黑暗之魂3" v-model="hobbies">黑暗之魂3
    <h2>你选择的游戏是：{{hobbies}}</h2>
  </div>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好',
        isFlag: false,
        hobbies: []
      }
    })
  </script>
</body>
</html>
