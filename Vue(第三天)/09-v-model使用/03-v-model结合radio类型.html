<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <h2>{{message}}</h2>
    <label for="nan">
      <input type="radio" id="nan" value="男" v-model="sex">男
    </label>
    <label for="nv">
      <input type="radio" id="nv" value="女" v-model="sex">女
    </label>
    <h2>你选择的性别是：{{sex}}</h2>
  </div>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好',
        sex: ''
      }
    })
  </script>
</body>
</html>
