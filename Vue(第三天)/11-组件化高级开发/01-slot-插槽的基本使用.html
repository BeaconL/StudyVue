<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
    <!-- 
      1.插槽的基本使用：<slot></slot>
      2.插槽的默认值：<slot>插槽默认值</slot>
      3.如果有多个值，同时放入到组件进行替换时，一起作为替换元素
     -->
  <div id="app">
    <h2>{{message}}</h2>
    <cpn><h1>哈哈哈</h1></cpn>
    <cpn><button>哈哈哈</button></cpn>
    <cpn><i>哈哈哈</i></cpn>
    <cpn>
      <i>哈哈哈</i>
      <button>哈哈哈</button>
    </cpn>
  </div>

  <template id="cpn">
    <div>
      <h2>你好</h2>
      <slot>插槽默认值</slot>
      <h2>哈哈哈</h2>
    </div>
  </template>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好'
      },
      components: {
        cpn: {
          template: '#cpn',

        }
      }
    })
  </script>
</body>
</html>
