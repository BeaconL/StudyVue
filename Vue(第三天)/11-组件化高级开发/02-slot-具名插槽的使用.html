<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <h2>{{message}}</h2>
    <cpn>
      <h2 slot="left"><button>按钮</button></h2>
      <h2 slot="center">我替换了中间</h2>
      <h2 slot="right"><i>HelloWorld</i></h2>
    </cpn>
  </div>

  <template id="cpn">
    <div>
      <slot name="left">左边</slot>
      <slot name="center">中间</slot>
      <slot name="right">右边</slot>
    </div>
  </template>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好'
      },
      components: {
        cpn: {
          template: '#cpn',

        }
      }
    })
  </script>
</body>
</html>
