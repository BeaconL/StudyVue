<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app" ref="app1">
    <h2>{{message}}</h2>
    <cpn></cpn>
    <cpn></cpn>
    <cpn ref="cpn1"></cpn>
    <button @click="appToCpn">按钮</button>
  </div>
  <template id="cpn">
    <div>
      我是子组件
    </div>
  </template>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好'
      },
      methods: {
        appToCpn(){
          // 1.$children 查询子组件
          //console.log(this.$children[0].pro1);
          //console.log(this.$children[0]);
          //this.$children[0].showMessage()

          // 2.$refs 查看ref标记的组件
          console.log(this.$refs);
          this.$refs.cpn1.showMessage()
        }
      },
      components: {
        cpn: {
          template: "#cpn",
          props: {
            pro1: {
              type:String,
              default(){
                return "props默认值"
              }
            }
          },
          data() {
            return {
              name: "我是子组件的name"
            }
          },
          methods: {
            showMessage(){
              console.log(this.pro1);
              console.log("你好啊");
            }
          },
        }
      }
    })
  </script>
</body>
</html>
