<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <div id="app">
    <h2>{{message}}</h2>
    <cpn2></cpn2>
  </div>
  <script src="../JS/vue.js"></script>
  <script>
    // 1.创建第一个组件(子组件)
    const cpnC1 = Vue.extend({
      template: `
      <div>
        <h2>Hello Vue</h2>
      </div>`
    })

    // 2.创建第二个组件(父组件)
    const cpnC2 = Vue.extend({
      template: `
      <div>
        <h2>Hello World</h2>
        <cpn1></cpn1>
      </div><div></div>
      `,
      components: {
        cpn1: cpnC1
      }
    })

    // root组件
    const app = new Vue({
      el: '#app',
      data: {
        message: '天气真好'
      },
      components: {
        cpn2: cpnC2
      }
    })
  </script>
</body>

</html>
