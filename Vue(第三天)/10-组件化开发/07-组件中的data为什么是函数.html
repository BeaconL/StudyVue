<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <!-- 组件实例对象 -->
  <div id="app">
    <cpn></cpn>
    <cpn></cpn>
    <cpn></cpn>
    <cpn></cpn>
  </div>
  <template id="cpn">
    <div>
      <h2>当期数字：{{counter}}</h2>
      <button @click="increment">+</button>
      <button @click="decrement">-</button>
    </div>
  </template>
  <script src="../JS/vue.js"></script>
  <script>
    // 1.注册组件
    Vue.component('cpn', {
      template: '#cpn',
      // 为什么要是个函数
      // 为了避免共享数据的情况
      // 如果想要共享数据就返回一个对象
      data(){
        return{
          counter: 0
        }
      },
      methods: {
        increment(){
          this.counter++
        },
        decrement(){
          this.counter--
        }
      }
    })

    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好'
      }
    })
  </script>
</body>
</html>
