<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <h2>{{message}}</h2>
    <!-- 3.使用组件 -->
    <my-cpn></my-cpn>
  </div>
  
  <script src="../JS/vue.js"></script>
  <script>
    // 1.创建组件构造器对象
    const cpnC = Vue.extend({
      template: `
      <div>
        <h2>Hello World</h2> 
      </div>`
    })

    // 2.注册组件
    Vue.component('my-cpn',cpnC)

    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好'
      }
    })
  </script>
</body>
</html>
