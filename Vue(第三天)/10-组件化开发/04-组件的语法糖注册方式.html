<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <h2>{{message}}</h2>
    <cpn1></cpn1>
    <cpn2></cpn2>
  </div>
  <script src="../JS/vue.js"></script>
  <script>
    // 1.全局组件注册语法糖
    // 1.创建组件构造器
    const cpn1 = Vue.extend({
      template: `
      <div>
        <h2>Hello World</h2>
      </div>
      `
    })

    // 2.组成组件
    Vue.component('cpn1', {
      template: `
      <div>
        <h2>Hello World</h2>
      </div>
      `
    })

    // 2.注册局部组件的语法糖
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好'
      },
      components: {
        cpn2: {
          template: `
            <div>
              <h2>Hello World</h2>
            </div>
          `
        }
      }
    })
  </script>
</body>
</html>
