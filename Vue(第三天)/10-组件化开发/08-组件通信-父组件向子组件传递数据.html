<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <h2>{{message}}</h2>
    <cpn :cmovies="movies" :cmessage="message"></cpn>
  </div>

  <template id="cpn">
    <div>
      <h2>{{cmessage}}</h2>
      <h2>{{cmovies}}</h2>
    </div>
  </template>

  <script src="../JS/vue.js"></script>
  <script>
    // 父传子：props
    const cpn = {
      template: '#cpn',
      //props: ['cmovies','cmessage'],
      props:{
        // 1.类型限制
        //cmovies: Array,
        //cmessage: String

        // 2.提供一些默认值，以及必传值
        cmessage: {
          type: String,
          default: '默认值',
          required: true
        },
        cmovies: {
          type: Array,
          defualt(){
            return []
          }
        }
      },
      data(){
        return{

        }
      }
    }

    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好',
        movies: ['海王','海贼王','海尔兄弟']
      },
      components: {
        cpn
      }
    })
  </script>
</body>
</html>
