<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <span v-if="isFlag">用户账号</span>
    <span v-else>用户邮箱</span>
    <button @click="isFlag = !isFlag">切换类型</button>
  </div>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        isFlag: true
      }
    })
  </script>
</body>
</html>
