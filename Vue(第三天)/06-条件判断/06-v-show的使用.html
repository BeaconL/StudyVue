<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <!-- v-if 是决定是否渲染 -->
    <h2 v-if="isShow">{{message}}</h2>
    <!-- v-show 是决定是否显示，通过display控制 -->
    <h2 v-show="isShow">{{message}}</h2>
  </div>
  <script src="../JS/vue.js"></script>
  <script>
    const app = new Vue({
      el: '#app',
      data: {
        message:'天气真好',
        isShow: false
      }
    })
  </script>
</body>
</html>
