<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <h2>总价格：{{totalPrice}}</h2>
    </div>
    <script src="../JS/vue.js"></script>
    <script>
        const app = new Vue({
            el: '#app',
            data: {
                books:[
                    {id: 110, name: 'Java编程思想', price: 119},
                    {id: 111, name: '代码大全', price: 100},
                    {id: 112, name: '计算机科学导论', price: 99},
                    {id: 113, name: '算法导论', price: 95},
                ]
            },
            computed: {
                totalPrice: function () {
                    let result = 0;
                    // for (let i=0; i < this.books.length; i++) {
                    //     result += this.books[i].price;
                    // }
                    
                    // 取下标
                    // for(let i in this.books){
                    //     result += this.books[i].price;
                    // }
                    
                    // 取对象
                    for(let i of this.books){
                        result += i.price;
                    }

                    return result;
                }
            }
        })
    </script>
</body>
</html>
